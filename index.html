<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bornsong Clinic – Pink & Blue Island Party</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=Noto+Sans+Thai:wght@300;400;600;700&family=Cherry+Bomb+One&display=swap" rel="stylesheet">
<style>
  :root {
    --p-deep:     #C2185B; 
    --p-mid:      #EC407A; 
    --p-soft:     #F48FB1; 
    --p-pale:     #FCE4EC; 
    --sea-blue:   #4FC3F7; 
    --sea-deep:   #0288D1; 
    --sand:       #FFF5F8; 
    --gold:       #FFD54F; 
    --white:      #FFFFFF;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100%; min-height:100vh;
    background: var(--sand);
    font-family: 'Noto Sans Thai', sans-serif;
    overflow-x: hidden;
    color: var(--p-deep);
  }

  /* ── PINK & BLUE PARADISE BACKGROUND ── */
  .island-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: linear-gradient(to bottom, #81D4FA 0%, var(--sea-blue) 30%, var(--p-pale) 70%, var(--sand) 100%);
  }

  .wave-decor {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 45vh;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%230288D1" fill-opacity="0.2" d="M0,224L48,213.3C96,203,192,181,288,181.3C384,181,480,203,576,213.3C672,224,768,224,864,197.3C960,171,1056,117,1152,112C1248,107,1344,149,1392,170.7L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
    background-size: cover;
    z-index: 1;
  }
  .wave-decor-pink {
    position: absolute; bottom: 0; left: 0; width: 100%; height: 35vh;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="%23F8BBD0" fill-opacity="0.5" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
    background-size: cover;
    z-index: 2;
  }

  .prop {
    position: absolute; z-index: 3;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
    animation: floatAnim 4s ease-in-out infinite alternate;
  }
  @keyframes floatAnim {
    from { transform: translateY(0) rotate(-5deg); }
    to { transform: translateY(-20px) rotate(5deg); }
  }

  .surfboard { top: 15%; left: -20px; font-size: 110px; transform: rotate(15deg); }
  .beachball { bottom: 12%; right: 5%; font-size: 85px; animation-delay: -1s; }
  .sun { top: 3%; right: 3%; font-size: 90px; filter: drop-shadow(0 0 40px var(--gold)); }
  .drink { bottom: 15%; left: 3%; font-size: 75px; animation-delay: -2s; }

  .page {
    position: relative; z-index: 10;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 50px 20px 80px;
  }

  header { text-align: center; margin-bottom: 30px; }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; letter-spacing: 8px; text-transform: uppercase;
    color: var(--white); font-weight: 700; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }
  h1 {
    font-family: 'Cherry Bomb One', cursive;
    font-size: clamp(42px, 12vw, 90px);
    color: var(--white); margin: 8px 0;
    text-shadow: 4px 4px 0px var(--p-deep), 8px 8px 25px rgba(0, 0, 0, 0.2);
  }
  .tagline { 
    font-size: 14px; letter-spacing: 5px; color: var(--white); 
    background: linear-gradient(90deg, var(--p-mid), var(--sea-blue)); padding: 8px 28px; border-radius: 50px;
    backdrop-filter: blur(10px); display: inline-block; font-weight: 700;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .shell-container {
    position: relative; width: 240px; height: 200px; margin: 20px auto;
    cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    -webkit-tap-highlight-color: transparent;
  }
  .shell-container:hover { transform: scale(1.1); }
  .shell-container.disabled { opacity: 0.5; pointer-events: none; transform: scale(0.9); filter: grayscale(0.4); }

  .pearl-aura {
    position: absolute; top: 50%; left: 50%;
    width: 140px; height: 140px;
    background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
    transform: translate(-50%, -50%);
    opacity: 0.5; border-radius: 50%;
    animation: auraPulse 2s ease-in-out infinite;
  }
  @keyframes auraPulse { 0%, 100% { opacity: 0.3; scale: 0.8; } 50% { opacity: 0.8; scale: 1.3; } }

  .main-pearl {
    position: absolute; top: 50%; left: 50%;
    width: 65px; height: 65px;
    background: radial-gradient(circle at 30% 30%, #fff 0%, #ffd1dc 40%, var(--p-soft) 100%);
    border-radius: 50%; transform: translate(-50%, -50%);
    z-index: 5; box-shadow: 0 0 35px #fff, inset -5px -5px 15px rgba(0,0,0,0.1);
    animation: pearlFloat 3s ease-in-out infinite;
  }
  @keyframes pearlFloat { from { transform: translate(-50%, -50%) translateY(0); } to { transform: translate(-50%, -50%) translateY(-15px); } }

  .shell-svg { width: 100%; height: 100%; filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.2)); position: relative; z-index: 4; }

  .hint {
    margin-top: 15px; font-size: 16px; color: var(--white);
    text-shadow: 0 2px 8px rgba(0,0,0,0.4); font-weight: 700; text-align: center;
  }

  /* ── SCRATCH BOX ── */
  .scratch-section {
    display: none; width: min(92vw, 540px);
    margin-top: 40px; text-align: center;
    animation: slideUp 0.7s cubic-bezier(0.19, 1, 0.22, 1);
  }
  @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

  .scratch-card {
    position: relative; width: 100%; aspect-ratio: 16/9;
    border-radius: 40px; overflow: hidden;
    border: 12px solid var(--white);
    box-shadow: 0 30px 60px rgba(0,0,0,0.2);
    background: var(--white);
    touch-action: none;
  }
  .prize-box {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #fff 0%, var(--p-pale) 100%);
  }
  .prize-icon { font-size: 75px; margin-bottom: 5px; animation: bounce 2s infinite; }
  .prize-name { font-size: 32px; font-weight: 700; color: var(--p-deep); line-height: 1.1; }
  .prize-sub { font-size: 12px; letter-spacing: 5px; text-transform: uppercase; color: var(--p-soft); margin-top: 10px; font-weight: 800; }

  canvas { position: absolute; inset: 0; z-index: 5; cursor: crosshair; }

  .prog-container { width: 100%; height: 18px; background: rgba(255,255,255,0.4); border-radius: 20px; margin: 30px 0; overflow: hidden; backdrop-filter: blur(10px); border: 2px solid var(--white); }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--p-mid)); width: 0%; transition: width 0.4s; }
  
  .btn-action { 
    padding: 18px 60px; border-radius: 50px; border: none; font-weight: 700; cursor: pointer;
    transition: all 0.3s; font-family: inherit; font-size: 18px;
    background: linear-gradient(135deg, var(--p-mid), var(--p-deep)); color: white; 
    box-shadow: 0 10px 30px rgba(194, 24, 91, 0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-action:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(194, 24, 91, 0.5); }

  /* ── MODALS ── */
  #winModal {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0, 136, 209, 0.3); backdrop-filter: blur(15px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .win-card {
    background: white; width: 100%; max-width: 460px; padding: 40px 30px; border-radius: 50px;
    text-align: center; box-shadow: 0 40px 100px rgba(0,0,0,0.3);
    position: relative; border-bottom: 15px solid var(--p-mid);
    max-height: 90vh; overflow-y: auto;
  }
  .form-group { text-align: left; margin-bottom: 18px; }
  .form-group label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--p-deep); }
  .form-control {
    width: 100%; padding: 15px 20px; border-radius: 18px; border: 2.5px solid var(--p-pale);
    font-family: inherit; font-size: 16px; outline: none; transition: all 0.3s;
    background-color: #fff9fb;
    color: var(--p-deep);
  }
  .form-control:focus { border-color: var(--p-mid); box-shadow: 0 0 0 5px rgba(236, 64, 122, 0.1); }

  footer { margin-top: auto; padding: 40px; font-size: 13px; color: var(--white); font-weight: 700; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

  #alreadyPlayed { 
    display: none; width: min(92vw, 500px); background: white; border-radius: 50px; text-align: center; 
    margin-top: 20px; padding: 60px 30px; box-shadow: 0 30px 70px rgba(0,0,0,0.15); border-bottom: 12px solid var(--p-mid);
    animation: slideUp 0.8s ease-out;
  }
</style>
</head>
<body>

<div class="island-bg">
  <div class="wave-decor"></div>
  <div class="wave-decor-pink"></div>
  <div class="prop sun">☀️</div>
  <div class="prop surfboard">🏄‍♀️</div>
  <div class="prop beachball">🏐</div>
  <div class="prop drink">🍹</div>
</div>

<div class="page">
  <header>
    <div class="brand-name">Bornsong Clinic</div>
    <h1>Bornsong <span>Summer</span></h1>
    <div class="tagline">✦ SUMMER GIFT 2026 ✦</div>
  </header>

  <!-- Interactive Shell -->
  <div class="shell-container" id="shellBtn" onclick="startIslandParty()">
    <div class="pearl-aura"></div>
    <div class="main-pearl"></div>
    <svg class="shell-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 50C10 75 30 90 50 90C70 90 90 75 90 50C90 35 75 20 50 20C25 20 10 35 10 50Z" fill="#FFF1F5" stroke="#F8BBD0" stroke-width="2"/>
      <path d="M15 50C15 65 30 78 50 78C70 78 85 65 85 50" stroke="#EC407A" stroke-width="2" stroke-linecap="round"/>
      <path d="M50 25V75M35 28V72M65 28V72" stroke="#F8BBD0" stroke-opacity="0.6" stroke-width="1.5"/>
    </svg>
  </div>
  <p class="hint" id="mainHint">🏝️ แตะมุกเพื่อรับรางวัล</p>

  <!-- Already Played State -->
  <div id="alreadyPlayed">
    <div style="width: 80px; height: 80px; background: var(--p-mid); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 30px; box-shadow: 0 15px 30px rgba(236,64,122,0.3);">✓</div>
    <p style="font-size: 28px; font-weight: 700; color: var(--p-deep); margin-bottom: 10px;">รับสิทธิเรียบร้อยแล้ว!</p>
    <div id="prevPrize" style="margin: 25px 0; padding: 35px; background: var(--p-pale); border-radius: 30px; font-size: 30px; font-weight: 700; color: var(--p-deep); border: 4px dashed var(--p-soft);">...</div>
    <p style="font-size: 16px; color: var(--p-mid); font-weight: 700; padding: 0 15px;">คุณได้รับสิทธิรายการด้านบนแล้ว และไม่สามารถสุ่มซ้ำได้ค่ะ</p>
  </div>

  <!-- Scratch Section -->
  <div class="scratch-section" id="scratchSection">
    <div class="scratch-card" id="canvasWrap">
      <div class="prize-box">
        <div class="prize-icon" id="iconBox">🎁</div>
        <div class="prize-name" id="nameBox">Special Prize</div>
        <div class="prize-sub">Bornsong Clinic</div>
      </div>
      <canvas id="scratchCanvas"></canvas>
    </div>
    <div class="prog-container"><div class="prog-fill" id="fillBar"></div></div>
    <button class="btn-action" onclick="revealAll()">✨ เปิดรางวัลทันที</button>
  </div>

  <footer>© 2026 Bornsong Clinic Summer</footer>
</div>

<!-- Form Modal -->
<div id="winModal">
  <div class="win-card">
    <h2 style="font-family: 'Cherry Bomb One', cursive; font-size: 45px; color: var(--p-mid); margin-bottom: 10px;">SURPRISE!</h2>
    <p style="font-weight: 700; opacity: 0.7;">ยินดีด้วยค่ะคุณได้รางวัล</p>
    <div id="finalResult" style="margin: 20px 0; padding: 30px; background: var(--p-pale); border-radius: 25px; font-size: 28px; font-weight: 700; color: var(--p-deep); border: 3px dashed var(--p-soft);">...</div>
    
    <div style="text-align: left; border-top: 2.5px solid var(--p-pale); padding-top: 30px; margin-top: 15px;">
      <form id="claimForm">
        <div class="form-group">
          <label>ชื่อ-นามสกุล</label>
          <input type="text" name="fullname" class="form-control" placeholder="ระบุชื่อของคุณ" required>
        </div>
        <div class="form-group">
          <label>เบอร์โทรศัพท์</label>
          <input type="tel" name="phone" class="form-control" placeholder="08X-XXX-XXXX" required>
        </div>
        <div class="form-group">
          <label>วันที่สะดวกเข้ารับบริการ</label>
          <input type="date" name="service_date" class="form-control" required style="min-height: 50px;">
        </div>
        <button type="submit" class="btn-action" style="width:100%" id="submitBtn">ยืนยันรับสิทธิ</button>
      </form>
    </div>
  </div>
</div>

<script>
// --- Configuration ---
// ใช้ URL ของ Google Apps Script ที่ Deploy แบบ "Anyone"
const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbzTrPZIBAIPM2cK7VcQqRNcqpxng_7xa1I9nAhIuJ-iB1bawa2_lQjqIPCF8XH8nR-K/exec"; 

const prizes = [
  { name: "Body s 1 ครั้ง", icon: "🧜‍♀️" },
  { name: "Meso ฝ้า 1 ครั้ง", icon: "🐚" },
  { name: "Meso aura skin 1 ครั้ง", icon: "✨" },
  { name: "Meso ลดสิว 1 ครั้ง", icon: "🌸" },
  { name: "VOUCHER แทนเงินสด 1,000.-", icon: "🎫" },
  { name: "VOUCHER แทนเงินสด 2,000.-", icon: "🎫" },
  { name: "Meso Chanel 1 ครั้ง", icon: "🌺" },
  { name: "เลเซอรรักแร้ 1 ครั้ง", icon: "🧼" },
  { name: "เลเซอร์หนวด 1 ครั้ง", icon: "🧔" },
  { name: "เลเซอร์บิกินี่ 1 ครั้ง", icon: "👙" }
];

let canvas, ctx, isScratching = false, isDone = false, currentPrize = null;

// ระบบป้องกันการเล่นซ้ำ
window.onload = () => {
  const hasPlayed = localStorage.getItem('bornsong_island_v2');
  const savedPrize = localStorage.getItem('bornsong_prize_v2');
  if (hasPlayed) {
    document.getElementById('shellBtn').classList.add('disabled');
    document.getElementById('mainHint').style.display = 'none';
    document.getElementById('alreadyPlayed').style.display = 'block';
    if (savedPrize) document.getElementById('prevPrize').innerText = savedPrize;
  }
};

function startIslandParty() {
  if (localStorage.getItem('bornsong_island_v2')) return;
  currentPrize = prizes[Math.floor(Math.random() * prizes.length)];
  document.getElementById('nameBox').innerText = currentPrize.name;
  document.getElementById('iconBox').innerText = currentPrize.icon;
  document.getElementById('scratchSection').style.display = 'block';
  document.getElementById('mainHint').innerText = "💖 ขูดฟองคลื่นสีฟ้าใสเพื่อดูรางวัลของคุณ";
  document.getElementById('shellBtn').classList.add('disabled');
  setTimeout(initCanvas, 100);
}

function initCanvas() {
  canvas = document.getElementById('scratchCanvas');
  const wrap = document.getElementById('canvasWrap');
  canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight;
  ctx = canvas.getContext('2d', { willReadFrequently: true });
  
  // Holographic Water Texture
  const grad = ctx.createLinearGradient(0,0, canvas.width, canvas.height);
  grad.addColorStop(0, '#81D4FA');
  grad.addColorStop(0.5, '#B2EBF2');
  grad.addColorStop(1, '#F8BBD0');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0, canvas.width, canvas.height);
  
  // Sea Bubbles
  for(let i=0; i<300; i++){
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.8})`;
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*4, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.globalCompositeOperation = 'destination-out';
  ctx.lineWidth = 55; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', stop);
  canvas.addEventListener('touchstart', start);
  canvas.addEventListener('touchmove', move);
  canvas.addEventListener('touchend', stop);
}

function getCoord(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

function start(e) { if (isDone) return; isScratching = true; const p = getCoord(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
function stop() { if (isScratching) { isScratching = false; checkProg(); } }
function move(e) { 
  if (isScratching && !isDone) {
    e.preventDefault();
    const p = getCoord(e);
    ctx.lineTo(p.x, p.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(p.x, p.y);
  }
}

function checkProg() {
  const data = ctx.getImageData(0,0, canvas.width, canvas.height).data;
  let count = 0;
  for(let i=3; i<data.length; i+=4) if(data[i] === 0) count++;
  const pct = (count / (data.length/4)) * 100;
  document.getElementById('fillBar').style.width = pct + '%';
  if(pct > 50) revealAll();
}

function revealAll() {
  if (isDone) return; isDone = true;
  ctx.clearRect(0,0, canvas.width, canvas.height);
  document.getElementById('fillBar').style.width = '100%';
  setTimeout(() => {
    document.getElementById('finalResult').innerText = currentPrize.icon + " " + currentPrize.name;
    document.getElementById('winModal').style.display = 'flex';
    partyConfetti();
  }, 500);
}

function partyConfetti() {
  const colors = ['#0288D1', '#4FC3F7', '#EC407A', '#FFD54F', '#FFFFFF'];
  for(let i=0; i<100; i++) {
    const d = document.createElement('div');
    d.style.cssText = `position:fixed;width:12px;height:12px;background:${colors[Math.floor(Math.random()*colors.length)]};top:-20px;left:${Math.random()*100}vw;z-index:2000;border-radius:50%;pointer-events:none;`;
    document.body.appendChild(d);
    d.animate([{ transform: 'translateY(0) rotate(0)', opacity: 1 }, { transform: `translateY(110vh) rotate(${Math.random()*720}deg)`, opacity: 0 }], { duration: 2000 + Math.random()*2000, easing: 'ease-out' }).onfinish = () => d.remove();
  }
}

// --- บันทึกข้อมูลไปยัง Google Sheets ---
document.getElementById('claimForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerText = "กำลังบันทึกข้อมูล...";
  
  const fd = new FormData(e.target);
  const pStr = currentPrize.icon + " " + currentPrize.name;
  
  const data = {
    fullname: fd.get('fullname'),
    phone: fd.get('phone'),
    service_date: fd.get('service_date'),
    prize: pStr,
    timestamp: new Date().toLocaleString('th-TH')
  };

  try {
    localStorage.setItem('bornsong_island_v2', 'true');
    localStorage.setItem('bornsong_prize_v2', pStr);
    
    if (GOOGLE_SHEET_URL) {
      await fetch(GOOGLE_SHEET_URL, { 
        method: 'POST', 
        mode: 'no-cors', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify(data) 
      });
    }
    
    // รีโหลดเพื่อแสดงหน้าสถานะ Already Played
    location.reload(); 
  } catch (err) {
    localStorage.setItem('bornsong_island_v2', 'true');
    localStorage.setItem('bornsong_prize_v2', pStr);
    location.reload();
  }
};
</script>

</body>
</html>
